<!DOCTYPE html>
<html>
<head>
    <title>Football AI PRO</title>

    <style>

        body{
            font-family: Arial;
            background:#0f172a;
            color:white;
            text-align:center;
            padding:40px;
        }

        .card{
            background:#1e293b;
            padding:20px;
            border-radius:12px;
            display:inline-block;
        }

        select,button{
            padding:10px;
            margin:10px;
            font-size:16px;
        }

        button{
            background:#22c55e;
            border:none;
            color:white;
            cursor:pointer;
        }

    </style>

</head>

<body>

<h1>⚽ Football AI PRO</h1>

<div class="card">

<form method="POST">

    <select name="home">
        {% for t in teams %}
        <option>{{t}}</option>
        {% endfor %}
    </select>

    vs

    <select name="away">
        {% for t in teams %}
        <option>{{t}}</option>
        {% endfor %}
    </select>

    <br>

    <button>Predict</button>

</form>

{% if result %}

<hr>

<h2>Wynik</h2>

<p>🏠 Home: {{result.home_win}}%</p>
<p>🤝 Draw: {{result.draw}}%</p>
<p>✈ Away: {{result.away_win}}%</p>

{% endif %}

</div>

</body>
</html>
